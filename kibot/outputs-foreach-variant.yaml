# This file defines the outputs that change per variant (i.e. need
# to be run once per variant).

# TODO: Generate BOM
# TODO: Generate PnP file
outputs:
- name: basic_boardview
  comment: Board view export
  type: boardview
  dir: Boardview

- name: pdf_sch_print
  comment: Schematic in PDF format
  type: pdf_sch_print
  dir: .

- name: render_3d_top
  comment: 3D view from top
  type: render_3d
  dir: 3D
  options:
    width: 1920
    height: 1080
    ray_tracing: true
    orthographic: true
- name: render_3d_30deg
  comment: 3D view from 30 degrees
  type: render_3d
  dir: 3D
  output_id: 30deg
  options:
    width: 1920
    height: 1080
    ray_tracing: true
    rotate_x: 3
    rotate_z: -2
- name: render_3d_bottom
  comment: 3D view from bottom
  type: render_3d
  dir: 3D
  options:
    width: 1920
    height: 1080
    ray_tracing: true
    orthographic: true
    view: bottom

- name: render_3d_30deg_hq_3
  comment: "3D render from top (High Quality)"
  type: blender_export
  dir: 3D
  options:
    render_options:
      transparent_background: true
      samples: 20
    light:
      pos_x: -size*1.67
      pos_y: size*1.67
      pos_z: size*2.5
      energy: 3
    point_of_view:
      file_id: 30deg3
      rotate_x: 30
      rotate_z: -20
    outputs:
      - type: blender
      - type: render

- name: render_3d_top_hq_2
  comment: "3D render from top (High Quality)"
  type: blender_export
  dir: 3D
  options:
    render_options:
      transparent_background: true
      samples: 20
    light:
      pos_x: -size*1.67
      pos_y: size*1.67
      pos_z: size*2.5
      energy: 2
    point_of_view:
      view: top
      file_id: top_2
    outputs:
      - type: blender
      - type: render

